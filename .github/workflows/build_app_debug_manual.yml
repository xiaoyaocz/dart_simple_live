name: build-app-debug-manual

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch/tag/SHA). Leave empty to use current ref."
        required: false
        type: string

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code (current ref)
        if: ${{ inputs.ref == '' }}
        uses: actions/checkout@v4

      - name: Checkout code (custom ref)
        if: ${{ inputs.ref != '' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
          cache: gradle

      - name: Set up Flutter 3.38.x
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.x
          cache: true

      - name: Restore dependencies
        working-directory: simple_live_app
        run: flutter pub get

      - name: Build debug APK
        working-directory: simple_live_app
        run: flutter build apk --debug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error