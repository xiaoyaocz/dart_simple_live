name: app-build-android-release

on:
  push:
    tags:
      - "v*"

jobs:
  build-android:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Android keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [[ -n "$KEYSTORE_BASE64" && -n "$STORE_PASSWORD" && -n "$KEY_PASSWORD" && -n "$KEY_ALIAS" ]]; then
            printf '%s' "$KEYSTORE_BASE64" | openssl base64 -d -A > simple_live_app/android/release-keystore.jks
            printf 'storeFile=../release-keystore.jks\nstorePassword=%s\nkeyPassword=%s\nkeyAlias=%s\n' "$STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" > simple_live_app/android/key.properties
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      - name: Restore Packages
        run: |
          cd simple_live_app
          flutter pub get

      - name: Read app version
        id: app_version
        shell: bash
        run: |
          app_version="$(grep '^version:' simple_live_app/pubspec.yaml | awk '{print $2}')"
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"

      - name: Build Android APK
        run: |
          cd simple_live_app
          flutter build apk --release

      - name: Rename APK for release
        id: apk_asset
        shell: bash
        run: |
          asset_path="simple_live_app/build/app/outputs/flutter-apk/simple_live_app-${{ steps.app_version.outputs.app_version }}-android.apk"
          cp simple_live_app/build/app/outputs/flutter-apk/app-release.apk "$asset_path"
          echo "asset_path=$asset_path" >> "$GITHUB_OUTPUT"

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: ${{ steps.apk_asset.outputs.asset_path }}

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          token: ${{ github.token }}
          fail_on_unmatched_files: false
          files: ${{ steps.apk_asset.outputs.asset_path }}

      - run: echo "Android job status is ${{ job.status }}."
