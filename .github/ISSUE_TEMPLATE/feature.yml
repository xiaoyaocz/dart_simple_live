name: Enhance / 功能建议
title: "[ENHANCE] 请填写简短易读的标题"
description: "请求新增功能、优化体验或补完已有能力"
labels:
  - "enhancement"
body:
  - type: markdown
    attributes:
      value: |
        请把一个建议拆成一个 `Enhance`，不要把多个完全不同的需求塞进同一个 Issue。
        如果你只是想分享使用妙招、配置经验或一般性提问，请改用 `Discussions`。

  - type: checkboxes
    id: terms
    attributes:
      label: 非重复的Issue
      description: 先去Issues列表中查找下是否存在相似的Issue，如果有了就不要重复发了
      options:
        - label: 已确认没有相似的Issue
          required: true

  - type: textarea
    id: description
    validations:
      required: true
    attributes:
      label: 需求描述
      description: 请说明你想解决什么问题、目前哪里不方便、理想结果是什么

  - type: checkboxes
    id: platform
    attributes:
      label: 平台
      description: 这个功能针对什么平台
      options:
        - label: Android
        - label: iOS
        - label: MacOS
        - label: Windows
        - label: Linux
        - label: Android TV

  - type: dropdown
    id: request-type
    attributes:
      label: 建议类型
      description: 请选择更接近你这次反馈的类型
      options:
        - 体验优化
        - 新增功能
        - 平台适配
        - 文案 / 图标 / UI 调整
        - 发布 / 构建 / 文档
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 附加信息
      description: 可以附加相关截图、视频、链接或参考产品

